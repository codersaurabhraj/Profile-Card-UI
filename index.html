<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d22de76062.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="main-card">
        <div class="profile-top">
            <img src="images/menu.png" class="menu-icon">
            <img src="images/setting.png" class="setting-icon">
            <img src="images/profile-pic.jpeg" class="profile-icon">
            <h3>Saurabh Raj</h3>
            <p>Python Full Stack Developer Bangalore, India </p>
        
        <div class="social-icons">
            <a href="https://www.instagram.com/_saurabh._01/" target="_blank"><img src="images/instagram.png"></a>
            <a href="https://github.com/codersaurabhraj" target="_blank"><img src="images/github.png" ></a>
            <a href="https://www.linkedin.com/in/saurabh-raj-44b580217/" target="_blank"><img src="images/linkedin.png" ></a>
        </div>

        <button id="btn">Follow</button>

        <div class="profile-bottom">
            <p>Learn More About My Profile</p>
            <img src="images/arrow.png" alt="">
        </div>


        </div>
    </div>
</body>
</html>
